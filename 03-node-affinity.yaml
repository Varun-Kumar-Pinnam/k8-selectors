apiVersion: v1
kind: Pod
metadata:
  name: nginx-affinity
  labels:
    project: roboshop
spec:
  containers:
  - name: nginx
    image: nginx
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values:
            - us-east-1f
            - us-east-1b
          - key: project
            operator: In
            values:
            - roboshopp       




